# クラシック・マイクロマウス迷路の寸法 (SI 単位: m)
# 出典: UKMARS / IEEE / 全日本マイクロマウス 標準
#   16x16 セル, セルピッチ180mm, 壁厚12mm, 壁高50mm
#   通路幅 = 180 - 12 = 168mm
#   壁は白側面+赤上面, 床は黒
#   スタートは(0,0)で北向き, ゴールは中央2x2

grid_size: 16
cell_pitch_m: 0.180
wall_thickness_m: 0.012
wall_height_m: 0.050

# ゴール領域 (0-indexed, 両端含む)。16x16 の中央2x2。
goal_min: [7, 7]
goal_max: [8, 8]
