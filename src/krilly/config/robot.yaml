# 車体の物理パラメータ (SI 単位: m)
# 出典: ハードウェア構成
#   オムニホイール 直径48mm / 幅25.5mm / 3個
#   ステッピングモーター ステップ角1.8° (=200 step/rev)

# 実効径 (公称48mm)。実機で校正済み (#11, scripts/calibrate --straight)。
wheel_diameter_m: 0.04629
wheel_count: 3
steps_per_rev: 200

# マイクロステップ分割数 (L6470 STEP_MODE)。1/16 を初期値とする。
microstep: 16

# 中心から各輪の接地点までの距離 L [m]。
# 実機で校正済み (#11, scripts/calibrate --rotate)。
center_to_wheel_m: 0.04595

# 各輪の「スポーク角」(車輪位置の角度) [deg]。120°対称配置。
# 運動学の式 v_i = -sin(theta_i)*vx + cos(theta_i)*vy + L*omega は、theta_i に
# このスポーク角を入れると正しく動く (駆動方向 = スポーク角 + 90°)。
# M0=前(spoke 0°, 駆動+y) / M1=後左(120°) / M2=後右(240°)。docs/coordinate-frames.md 参照。
# 実機で校正済み (#11): drive_demo で +x=前進 / +y=左 / +omega=CCW を確認。
wheel_angles_deg: [0.0, 120.0, 240.0]
